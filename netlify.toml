# Configuration Netlify pour le site CM26
# - publish = "." : le site est un simple index.html à la racine
# - functions : dossier où Netlify va chercher les fonctions serveur
[build]
  publish = "."
  functions = "netlify/functions"

# Le client appelle /api/matches (URL Cloudflare). Sur Netlify, on redirige
# en interne (status 200 = proxy, pas de redirection visible) vers la fonction
# Netlify existante, pour que le site reste fonctionnel pendant la transition.
[[redirects]]
  from = "/api/matches"
  to = "/.netlify/functions/matches"
  status = 200
