  "England":"ENG","Croatia":"CRO","Panama":"PAN","Ghana":"GHA"
};
// Renvoie { name (FR si dispo), flag (drapeau rond du site, sinon logo officiel) }
function apiTeamDisplay(team){
  if(!team || !team.name){
    return {name:"À déterminer", flag:`<span class="flag fb"><i style="background:#2a2f3a"></i></span>`};
  }
  let code=null;
  if(team.tla && T[team.tla])code=team.tla;
  else if(EN_FR[team.name] && T[EN_FR[team.name]])code=EN_FR[team.name];
  if(code)return {name:nm(code), flag:flagHTML(code)};
  // repli : logo officiel (crest) + nom court anglais, sans casser l'affichage
  const en=team.shortName||team.name;
  const flag=team.crest
    ? `<img class="flag" loading="lazy" alt="${escAttr(en)}" src="${escAttr(team.crest)}">`
    : `<span class="flag fb"><i style="background:#2a2f3a"></i></span>`;
  return {name:escAttr(en), flag};
}

// utcDate (UTC) -> texte en heure de Paris
function fmtParis(utc){
  try{
    return new Date(utc).toLocaleString("fr-FR",{timeZone:"Europe/Paris",weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
  }catch(e){return utc||""}
}
function statusBadge(m){
  if(m.status==="FINISHED")return `<span class="pbadge fin">Terminé</span>`;
  if(m.status==="IN_PLAY"||m.status==="PAUSED")return `<span class="pbadge live">En direct 🔴</span>`;
  return `<span class="pbadge">À venir</span>`;
}
function stageLabel(s){
  return {LAST_32:"16es de finale",LAST_16:"8es de finale",QUARTER_FINALS:"Quarts de finale",
    SEMI_FINALS:"Demi-finales",THIRD_PLACE:"3e place",FINAL:"Finale"}[s]||"Phase finale";
}
// Verrouillage par match : modifiable seulement si TIMED et coup d'envoi (utcDate) pas encore passé.
function apiMatchLocked(m){
  // commencé / fini / suspendu -> verrouillé
  if(m.status && m.status!=="TIMED" && m.status!=="SCHEDULED")return true;
  const d=new Date(m.utcDate);
  if(isNaN(d.getTime()))return Date.now()>=TOURNAMENT_LOCK.getTime(); // garde-fou si date inconnue
  return Date.now() >= d.getTime() - MATCH_LOCK_BEFORE_MS; // verrouillé dès 1 h avant le coup d'envoi
}

// --- CHAÎNES TV ---
// Code 3 lettres du site pour une équipe API (via tla, sinon nom anglais).
function teamCode(team){
  if(!team)return null;
  if(team.tla && T[team.tla])return team.tla;
  if(team.name && EN_FR[team.name] && T[EN_FR[team.name]])return EN_FR[team.name];
  return team.tla||null;
}
// Nom FR (texte brut) d'une équipe API, repli sur l'anglais.
function teamFrName(team){
  const c=teamCode(team);
  if(c)return nm(c);
  return (team&&(team.shortName||team.name))||"À déterminer";
}
// Affiches de groupe diffusées en clair sur M6 (clé = paire de codes triée). beIN partout.
const M6_GROUP=new Set(["MEX|RSA","BIH|CAN","QAT|SUI","BRA|MAR","CUW|GER","JPN|NED","CPV|ESP","BEL|EGY",
  "KSA|URU","FRA|SEN","IRQ|NOR","COD|POR","CRO|ENG","CZE|RSA","BIH|SUI","AUS|USA","MAR|SCO","BRA|HAI",
  "NED|SWE","CIV|GER","ESP|KSA","BEL|IRN","ARG|AUT","FRA|IRQ","POR|UZB","ENG|GHA","CAN|SUI","BRA|SCO",
  "ECU|GER","NED|TUN","FRA|NOR","ESP|URU","ENG|PAN","COL|POR"]);
// Renvoie la liste des chaînes pour un match.
function channelsFor(m){
  const ch=["bein"]; // toujours beIN
  const a=teamCode(m.homeTeam), b=teamCode(m.awayTeam);
  if(m.stage==="GROUP_STAGE"){
    if(a&&b && M6_GROUP.has([a,b].sort().join("|")))ch.unshift("m6");
  }else if(m.stage){
    // phases finales : M6 sur la France, les demies, la 3e place et la finale
    const fr=(a==="FRA"||b==="FRA");
    if(fr||m.stage==="SEMI_FINALS"||m.stage==="THIRD_PLACE"||m.stage==="FINAL")ch.unshift("m6");
  }
  return ch;
}
function channelBadges(m){
  return `<span class="chan">📺 `+channelsFor(m).map(c=>c==="m6"?`<b class="m6">M6</b>`:`<b class="bein">beIN</b>`).join(" ")+`</span>`;
}
// Boutons ★ watchlist + agenda (seulement si les deux équipes sont connues).
function matchActions(m){
  const id=String(m.id);
  if(!(m.homeTeam&&m.homeTeam.name&&m.awayTeam&&m.awayTeam.name))return "";
  return `<button class="iconbtn star sm ${isWatched(id)?'on':''}" title="Ma watchlist" onclick="toggleWatch('${id}')">${isWatched(id)?'★':'☆'}</button>
    <button class="iconbtn cal sm ${id===_blinkCal?'blink':''}" id="cal-${id}" title="Ajouter à mon agenda" onclick="openCal('${id}')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></button>`;
}

// Ligne d'un match de poule. Trois cas :
//  - TERMINÉ (FINISHED + score réel connu) : score réel + ton prono + points gagnés, bien labellisés.
//  - EN COURS (IN_PLAY/PAUSED, ou fini sans résultat encore) : ton prono en lecture seule + "résultat à venir".
//  - À VENIR (TIMED/SCHEDULED) : champs de saisie du prono (verrouillés 1 h avant le coup d'envoi). Inchangé.
function matchPronoRow(m){
  // Équipes pas encore connues (phase finale à venir) -> placeholder, pas de saisie.
  if(!(m.homeTeam&&m.homeTeam.name&&m.awayTeam&&m.awayTeam.name))return unknownMatchRow(m);
  const home=apiTeamDisplay(m.homeTeam), away=apiTeamDisplay(m.awayTeam);
  const id=String(m.id);
  const p=state.pronos[id]||{};
  const sc=(m.score&&m.score.fullTime)||{};
  const hasScore=sc.home!=null && sc.away!=null;
  const hasProno=p.a!=null && p.b!=null;
  const finished=m.status==="FINISHED" && hasScore;       // terminé, résultat réel connu
  const started=m.status==="IN_PLAY"||m.status==="PAUSED"||(m.status==="FINISHED"&&!hasScore); // commencé, pas (encore) de résultat affichable

  let middle, strip="";
  if(finished){
    // Case du milieu = SCORE RÉEL, clairement étiqueté.
    middle=`<div class="scorebox done">
        <span class="sclab">Score réel</span>
        <div class="scrow"><span class="sc">${sc.home}</span><span>–</span><span class="sc">${sc.away}</span></div>
      </div>`;
    // Bandeau plein-largeur sous le match : TON prono + points gagnés (visuellement distinct du score réel).
    if(hasProno){
      const pts=matchPoints(p.a,p.b,sc.home,sc.away);
      strip=`<div class="presult"><span class="rlab">Ton prono :</span><span class="rpv">${p.a}–${p.b}</span>${ptsBadge(pts)}</div>`;
    }else{
      strip=`<div class="presult"><span class="nopr">Pas de prono · 0 pt</span></div>`;
    }
  }else if(started){
    // Match commencé : ton prono en lecture seule (verrouillé), pas de points tant que pas de résultat.
    middle=hasProno
      ? `<div class="scorebox"><div class="pronoview" title="Prono verrouillé"><span class="pv">${p.a}</span><span>–</span><span class="pv">${p.b}</span><span class="lk">🔒</span></div></div>`
      : `<div class="scorebox"><div class="pronoview"><span class="nopr">Pas de prono</span><span class="lk">🔒</span></div></div>`;
    strip=`<div class="presult"><span class="live">⏳ Match en cours · résultat à venir</span></div>`;
  }else{
    // Match à venir : saisie du prono (inchangé).
    const locked=apiMatchLocked(m);
    const dis=locked?"disabled":"";
    middle=`<div class="scorebox ${id===_blinkScore?'blink-score':''}" id="score-${id}">
        <input type="number" inputmode="numeric" min="0" max="20" value="${p.a??''}" placeholder="–" ${dis} onchange="setProno('${id}','a',this.value)">
        <span title="${locked?'Prono verrouillé (1 h avant le match)':''}">${locked?'🔒':'–'}</span>
        <input type="number" inputmode="numeric" min="0" max="20" value="${p.b??''}" placeholder="–" ${dis} onchange="setProno('${id}','b',this.value)">
      </div>`;
  }
  return `<div class="prono">
    <div class="pside">${home.flag}<span class="nm">${home.name}</span></div>
    ${middle}
    <div class="pside r">${away.flag}<span class="nm">${away.name}</span></div>
    ${strip}
    <div class="pmeta">${fmtParis(m.utcDate)} · ${statusBadge(m)} ${channelBadges(m)}
      <span class="pstat" id="pstat-${id}"></span>
      <span class="pacts">${matchActions(m)}</span></div>
  </div>`;
}
// Ligne d'un match dont les équipes ne sont PAS encore connues (phase finale à venir) :
// pas de prono possible, on affiche juste le libellé de la phase (ou le score s'il existe).
function unknownMatchRow(m){

/* ---- Filtres des pronos de match (journée / date / heure / équipe) ---- */
let pronoFilter={jour:"all", date:"all", heure:"all", chaine:"all", team:""};
function setPronoFilter(k,v){
  pronoFilter[k]=v;
  render();
  if(k==="team"){const el=document.getElementById("pronoTeam");if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}}
}
function resetPronoFilter(){pronoFilter={jour:"all",date:"all",heure:"all",chaine:"all",team:""};render()}
// normalise (minuscules + sans accents) pour une recherche tolérante
function norm(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"")}
// heure de Paris "HH:MM" d'un match
function parisHour(m){try{return new Date(m.utcDate).toLocaleTimeString("fr-FR",{timeZone:"Europe/Paris",hour:"2-digit",minute:"2-digit"})}catch(e){return""}}
// date de Paris : clé stable "AAAA-MM-JJ" + libellé lisible "Sam. 13 juin"
function parisDateKey(m){try{return new Date(m.utcDate).toLocaleDateString("en-CA",{timeZone:"Europe/Paris"})}catch(e){return""}}
function parisDateLabel(m){try{const s=new Date(m.utcDate).toLocaleDateString("fr-FR",{timeZone:"Europe/Paris",weekday:"short",day:"numeric",month:"short"});return s.charAt(0).toUpperCase()+s.slice(1)}catch(e){return""}}
// liste d'autocomplétion (noms FR des équipes présentes)
function teamDatalist(){
  const seen=new Set();let opts="";
  (apiMatches||[]).forEach(m=>[m.homeTeam,m.awayTeam].forEach(t=>{
    if(t&&t.name){const fr=teamFrName(t);if(!seen.has(fr)){seen.add(fr);opts+=`<option value="${escAttr(fr)}">`}}
  }));
  return `<datalist id="teamlist">${opts}</datalist>`;
}
function pronoFilterBar(){

  const hours=[...new Set((apiMatches||[]).map(parisHour).filter(Boolean))].sort();
  const hourOpts=`<option value="all">Toutes</option>`+hours.map(h=>`<option value="${h}" ${pronoFilter.heure===h?"selected":""}>${h}</option>`).join("");
  const chaines=[["all","Toutes"],["m6","M6 (en clair)"],["bein","beIN Sports"]];
  const chaineOpts=chaines.map(([v,l])=>`<option value="${v}" ${pronoFilter.chaine===v?"selected":""}>${l}</option>`).join("");
  const active=pronoFilter.jour!=="all"||pronoFilter.date!=="all"||pronoFilter.heure!=="all"||pronoFilter.chaine!=="all"||pronoFilter.team;

// Construit la liste des matchs (filtres + poules par journée + phase finale à part).
// Coeur commun : filtre + liste des matchs. rowFn = rendu d'une ligne de poule.
function matchListHTML(rowFn, finalsNote){
  ensureApiMatches();
  if(!apiMatches){
    if(apiMatchesError){
      return `<div class="empty"><div class="em">⚠️</div><h3>Matchs indisponibles</h3>
        <p>${escAttr(apiMatchesError)}</p>
        <button class="chip" style="margin-top:10px" onclick="reloadApiMatches()">↻ Réessayer</button></div>`;
    }
    return `<p class="sub">Chargement des matchs…</p>`;
  }
  const banner=apiMatchesError
    ? `<p class="sub" style="color:var(--red)">⚠️ Mise à jour impossible (${escAttr(apiMatchesError)}) — affichage du cache. <a href="#" onclick="reloadApiMatches();return false">Réessayer</a></p>`
    : "";

  // --- application des filtres ---
  const q=norm(pronoFilter.team);
  const teamMatch=m=>{
    if(!q)return true;
    const f=[];[m.homeTeam,m.awayTeam].forEach(t=>{if(t){f.push(teamFrName(t));if(t.tla)f.push(t.tla);if(t.name)f.push(t.name)}});
    return f.some(x=>norm(x).includes(q));
  };
  let groups=apiMatches.filter(m=>m.stage==="GROUP_STAGE");
  let finals=apiMatches.filter(m=>m.stage && m.stage!=="GROUP_STAGE");
  if(pronoFilter.jour==="finale"){groups=[]}
  else if(pronoFilter.jour!=="all"){groups=groups.filter(m=>(m.matchday||0)===+pronoFilter.jour);finals=[]}
  if(pronoFilter.date!=="all"){groups=groups.filter(m=>parisDateKey(m)===pronoFilter.date);finals=finals.filter(m=>parisDateKey(m)===pronoFilter.date)}
  if(pronoFilter.heure!=="all"){groups=groups.filter(m=>parisHour(m)===pronoFilter.heure);finals=finals.filter(m=>parisHour(m)===pronoFilter.heure)}
  if(pronoFilter.chaine!=="all"){const ch=m=>channelsFor(m).includes(pronoFilter.chaine);groups=groups.filter(ch);finals=finals.filter(ch)}
  groups=groups.filter(teamMatch);finals=finals.filter(teamMatch);

  // Les matchs TERMINÉS (anciens) vont dans un bloc dépliable "Résultats passés",
  // placé EN HAUT (juste sous les filtres) et FERMÉ par défaut : on le déroule d'un clic.
  const isOld=m=>m && m.status==="FINISHED";

  let upHTML="", pastHTML="", upcomingCount=0, pastCount=0;
  const byDay={};
  groups.forEach(m=>{const d=m.matchday||0;(byDay[d]=byDay[d]||[]).push(m)});
  Object.keys(byDay).map(Number).sort((a,b)=>a-b).forEach(d=>{
    const ms=byDay[d].sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));
    const head=`<h4 class="mdh">Journée ${d} · phase de groupes</h4>`;
    const up=ms.filter(m=>!isOld(m)), old=ms.filter(isOld);
    if(up.length){ upHTML+=head+up.map(rowFn).join(""); upcomingCount+=up.length; }
    if(old.length){ pastHTML+=head+old.map(rowFn).join(""); pastCount+=old.length; }
  });
  if(finals.length){
    finals.sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));
    // Un bloc par tour, dans l'ordre du tournoi (16es -> finale).
    const STAGE_ORDER=["LAST_32","LAST_16","QUARTER_FINALS","SEMI_FINALS","THIRD_PLACE","FINAL"];
    const byStage={};
    finals.forEach(m=>{(byStage[m.stage]=byStage[m.stage]||[]).push(m)}); // déjà trié par date
    Object.keys(byStage)
      .sort((a,b)=>{const ia=STAGE_ORDER.indexOf(a),ib=STAGE_ORDER.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib)})
      .forEach(st=>{
        const ms=byStage[st];
        const head=`<h4 class="mdh">${stageLabel(st)}</h4>`;
        const up=ms.filter(m=>!isOld(m)), old=ms.filter(isOld);
        if(up.length){
          // Note "équipes à déterminer" seulement s'il reste des affiches inconnues dans ce tour.
          const someUnknown=up.some(m=>!(m.homeTeam&&m.homeTeam.name&&m.awayTeam&&m.awayTeam.name));
          upHTML+=head+(someUnknown?`<p class="sub" style="margin:-2px 0 8px">${finalsNote}</p>`:"")+up.map(rowFn).join("");
          upcomingCount+=up.length;
        }
        if(old.length){ pastHTML+=head+old.map(rowFn).join(""); pastCount+=old.length; }
      });
  }
  // Bloc dépliable des résultats passés : fermé par défaut (ouvert d'office s'il n'y a aucun
  // match à venir à afficher). Placé EN HAUT pour qu'on le trouve et le déroule facilement.
  let pastBlock="";
  if(pastCount){
    const open=upcomingCount===0?" open":"";
    pastBlock=`<details class="pastwrap"${open}><summary class="pastsum">🗂️ Voir les ${pastCount} match${pastCount>1?"s":""} déjà joué${pastCount>1?"s":""}<span class="pasthint">résultats passés</span></summary><div class="pastbody">${pastHTML}</div></details>`;
  }
  let html=banner+pronoFilterBar()+pastBlock+upHTML;
  if(!upcomingCount && !pastCount)html+=emptyState("🔍","Aucun match","Aucun match ne correspond à tes filtres.");
  return html;
}

// Enregistre les pronos de match dans Supabase (upsert user_id + match_id ; match_id = ID API).
async function saveMatchPronos(){
  if(!state.user){toast("Connecte-toi pour enregistrer tes pronos");return}
  const now=new Date().toISOString();
  const byId={}; (apiMatches||[]).forEach(m=>{byId[String(m.id)]=m});
  const rows=[];
  Object.keys(state.pronos).forEach(mid=>{
    const m=byId[mid];
    if(m && apiMatchLocked(m))return;          // match commencé -> on ne pousse pas
    const p=state.pronos[mid]||{};
    if(p.a==null && p.b==null)return;
    rows.push({user_id:state.user.id,match_id:mid,pred_home:p.a??null,pred_away:p.b??null,updated_at:now});
  });
  if(!rows.length){toast("Aucun prono à enregistrer");return}
  const {error}=await supabase.from("match_predictions").upsert(rows,{onConflict:"user_id,match_id"});
  if(error){toast("Enregistrement impossible : "+error.message);return}
  lbCache=null; // le classement devra se recalculer
  toast("Pronos de match enregistrés ✓");
}
function setProno(id,side,val){
  state.pronos[id]=state.pronos[id]||{};
  if(val===""){delete state.pronos[id][side]} else {state.pronos[id][side]=+val}
  if(!Object.keys(state.pronos[id]).length)delete state.pronos[id];
  save();                 // cache local instantané
  scheduleAutoSave(id);   // enregistrement auto vers Supabase
}

/* ---- Enregistrement AUTOMATIQUE par match (avec debounce) ---- */
const _saveTimers={}, _okTimers={};

// Programme une sauvegarde ~600 ms après la dernière saisie, si les 2 scores sont remplis.
function scheduleAutoSave(id){
  if(!state.user)return;                          // non connecté -> localStorage seulement
  const p=state.pronos[id]||{};
  if(p.a==null||p.b==null)return;                 // on attend les deux scores
  clearTimeout(_saveTimers[id]);
  _saveTimers[id]=setTimeout(()=>autoSaveMatch(id),600);
}

// Sauvegarde CE match seul (upsert user_id + match_id).
async function autoSaveMatch(id){
  if(!state.user)return;
  const m=(apiMatches||[]).find(x=>String(x.id)===id);
  if(m && apiMatchLocked(m))return;               // match commencé -> lecture seule, on ne sauve pas
  const p=state.pronos[id]||{};
  if(p.a==null||p.b==null)return;
  setPronoStatus(id,"loading");
  const {error}=await supabase.from("match_predictions").upsert(
    {user_id:state.user.id,match_id:id,pred_home:p.a,pred_away:p.b,updated_at:new Date().toISOString()},
    {onConflict:"user_id,match_id"});
  if(error){setPronoStatus(id,"error");toast("Enregistrement impossible : "+error.message);return}
  lbCache=null;                                   // le classement devra se recalculer
  setPronoStatus(id,"ok");
}

// Petit retour visuel discret par carte (⏳ / ✓ enregistré / ⚠️).
function setPronoStatus(id,kind){
  const el=document.getElementById("pstat-"+id);
  if(!el)return;
  clearTimeout(_okTimers[id]);
  if(kind==="loading"){el.textContent="⏳";el.className="pstat";}
  else if(kind==="ok"){
    el.textContent="✓ enregistré";el.className="pstat ok";
    _okTimers[id]=setTimeout(()=>{const e=document.getElementById("pstat-"+id);if(e){e.textContent="";e.className="pstat"}},1600);
  }
  else if(kind==="error"){el.textContent="⚠️";el.className="pstat err";}
  else {el.textContent="";el.className="pstat";}
}

/* ============================================================
   FRESH NEWS — actus foot (RSS) via /api/news, spécial Mondial
============================================================ */
let newsCache=null, newsTs=0, newsError=null, newsLoading=false;
(function(){ const c=store.get("cm26_news",null); if(c && c.ts && Array.isArray(c.items)){ newsCache=c.items; newsTs=c.ts; } })();

async function loadNews(force){
  if(newsLoading)return;
  if(!force && newsCache && (Date.now()-newsTs)<10*60*1000)return; // cache 10 min
  newsLoading=true;
  try{
    const res=await fetch("/api/news");
    if(!res.ok){ newsError="Service indisponible ("+res.status+")."; return; }
    const data=await res.json().catch(()=>null);
    newsCache=Array.isArray(data)?data:[];
    newsTs=Date.now(); newsError=null;
    store.set("cm26_news",{ts:newsTs,items:newsCache});
  }catch(e){ newsError="Hors ligne ou service indisponible."; }
  finally{ newsLoading=false; }
}
function ensureNews(){
  if(newsLoading || newsError)return;
  if(!newsCache || (Date.now()-newsTs)>=10*60*1000) loadNews().then(()=>{ if(state.view==="news")render(); });
}
function reloadNews(){ newsError=null; loadNews(true).then(()=>render()); }

function newsRelDate(iso){
  if(!iso)return "";
  const d=new Date(iso); if(isNaN(d.getTime()))return "";
  const min=Math.floor((Date.now()-d.getTime())/60000);
  if(min<1)return "à l'instant";
  if(min<60)return "il y a "+min+" min";
  const h=Math.floor(min/60); if(h<24)return "il y a "+h+" h";
  const j=Math.floor(h/24); if(j<7)return "il y a "+j+" j";
  return d.toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
}

// Calcule, par équipe (code du site), points et buts depuis les matchs de poule
// TERMINÉS (3 pts victoire, 1 nul, 0 défaite). Renvoie { CODE: {pts, gf, ga, pl} }.
// Les équipes sans match joué n'apparaissent pas (=> traitées comme 0 au rendu).
function computeGroupStats(){
  const stats={};
  (apiMatches||[]).forEach(m=>{
    if(m.stage!=="GROUP_STAGE")return;
    const ft=m.score&&m.score.fullTime;
    if(!(m.status==="FINISHED" && ft && ft.home!=null && ft.away!=null))return;
    const ch=teamCode(m.homeTeam), ca=teamCode(m.awayTeam);
    const h=Number(ft.home), a=Number(ft.away);
    if(!ch||!ca || ![h,a].every(Number.isFinite))return;
    const sh=stats[ch]||(stats[ch]={pts:0,gf:0,ga:0,pl:0});
    const sa=stats[ca]||(stats[ca]={pts:0,gf:0,ga:0,pl:0});
    sh.gf+=h; sh.ga+=a; sh.pl++;
    sa.gf+=a; sa.ga+=h; sa.pl++;
    if(h>a){sh.pts+=3}
    else if(a>h){sa.pts+=3}
    else {sh.pts++; sa.pts++}
  });
  return stats;
}

  if(grpTab==="resultats"){

    </div>`;
    view.innerHTML=hero+sub+`<div class="panel">${resultMatchesHTML()}</div>`;
    return;
  }

  // --- Sous-vue GROUPES (par défaut) : classement vivant (points + diff de buts) ---
  ensureApiMatches();               // charge les matchs si besoin (re-render auto au retour)
  const gstats=computeGroupStats(); // points/diff par équipe, calculés depuis les résultats
  let html=`${resumayHTML()}<div class="hero" style="padding:24px 26px">
    <div class="kick">Tirage officiel · 5 décembre 2025</div>
    <h2 style="font-size:28px">Les 12 groupes</h2>
    <p>Classement en direct : points et différence de buts, recalculés à chaque résultat. Les 2 premiers + les 8 meilleurs 3<sup>es</sup> filent en 16<sup>es</sup>.</p>
  </div>`+sub+`<div class="groupgrid">`;
  Object.keys(GROUPS).forEach((g,i)=>{
    // Une ligne par équipe, triée par POINTS puis DIFF de buts (ordre du tirage en dernier recours).
    const rows=GROUPS[g].map((code,seed0)=>{
      const s=gstats[code]||{pts:0,gf:0,ga:0,pl:0};
      return {code, seed0, pts:s.pts, diff:s.gf-s.ga};
    }).sort((a,b)=> b.pts-a.pts || b.diff-a.diff || a.seed0-b.seed0);
    html+=`<div class="gcard" style="animation-delay:${i*.03}s">
      <h4><span class="gl">${g}</span> Groupe ${g}</h4>
      ${rows.map((r,rank)=>{
        const ds=(r.diff>0?"+":"")+r.diff; // ex. +3, 0, -2
        return `<div class="grow"><span class="grk">${rank+1}</span>${flagHTML(r.code)}<span class="nm">${nm(r.code)}</span><span class="gpts"><b>${r.pts}</b> pts</span><span class="gdiff">${ds}</span></div>`;
      }).join("")}
    </div>`;
  });
  html+=`</div>`;view.innerHTML=html;
}

// ---------- TABLEAU FINAL (bracket) — sous-vue de "Groupes & Résultats" ----------
// Vue rapide en LECTURE SEULE de la phase à élimination directe : une colonne par
// tour (16es -> finale), affiches + horaires (Paris) + chaînes TV + score si joué.
// Réutilise matchResultRow (gère équipes inconnues, score, statut, ★/agenda).
// Heure de Paris compacte (sans jour de semaine) pour les cartes du bracket.
function brkWhen(utc){
  try{return new Date(utc).toLocaleString("fr-FR",{timeZone:"Europe/Paris",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}
  catch(e){return""}
}
// id de l'équipe gagnante d'un match terminé (gère les tirs au but via score.winner), sinon null.
function brkWinnerId(m){
  if(!m || m.status!=="FINISHED")return null;
  const w=m.score&&m.score.winner;
  if(w==="HOME_TEAM")return m.homeTeam&&m.homeTeam.id;
  if(w==="AWAY_TEAM")return m.awayTeam&&m.awayTeam.id;
  // repli si winner absent : compare le score (puis les tirs au but).
  const ft=(m.score&&m.score.fullTime)||{}, pn=(m.score&&m.score.penalties)||{};
  if(ft.home!=null && ft.away!=null){
    if(ft.home>ft.away)return m.homeTeam&&m.homeTeam.id;
    if(ft.away>ft.home)return m.awayTeam&&m.awayTeam.id;
    if(pn.home!=null && pn.away!=null)return (pn.home>pn.away ? m.homeTeam : m.awayTeam||{}).id;
  }
  return null;
}
// Vrai si l'équipe `id` (vainqueur) figure dans le match enfant -> affrontement CONFIRMÉ.
function brkChildHas(child,id){
  return !!(child && id!=null && ((child.homeTeam&&child.homeTeam.id===id)||(child.awayTeam&&child.awayTeam.id===id)));
}
// Carte compacte d'un match dans l'arbre : 2 lignes (équipes + score), puis heure + chaînes.
function brkCard(m){
  const home=apiTeamDisplay(m.homeTeam), away=apiTeamDisplay(m.awayTeam);
  const sc=(m.score&&m.score.fullTime)||{};
  const has=sc.home!=null && sc.away!=null;
  const live=m.status==="IN_PLAY"||m.status==="PAUSED";
  const win=brkWinnerId(m);
  const hWin=win!=null && m.homeTeam && m.homeTeam.id===win;
  const aWin=win!=null && m.awayTeam && m.awayTeam.id===win;
  const tvs=channelsFor(m).map(c=>c==="m6"?'<b class="m6">M6</b>':'<b class="bein">beIN</b>').join(" ");
  const meta=`${live?'🔴 ':''}${brkWhen(m.utcDate)}${tvs?` · ${tvs}`:''}`;
  const row=(t,scv,w,l)=>`<div class="bm-row ${w?'win':''} ${l?'out':''}">${t.flag}<span class="bm-nm">${t.name}</span>${has?`<span class="bm-sc">${scv}</span>`:''}</div>`;
  return `<div class="bm ${live?'live':''}" id="brk-${m.id}">
    ${row(home,sc.home,hWin,win!=null&&!hWin)}
    ${row(away,sc.away,aWin,win!=null&&!aWin)}
    <div class="bm-meta">${meta}</div>
  </div>`;
}
function bracketHTML(){
  ensureApiMatches(); // charge les matchs si besoin (re-render auto au retour)
  if(!apiMatches){
    return apiMatchesError
      ? emptyState("⚠️","Matchs indisponibles",escAttr(apiMatchesError))+`<div style="text-align:center"><button class="chip" onclick="reloadApiMatches()">↻ Réessayer</button></div>`
      : `<p class="sub">Chargement des matchs…</p>`;
  }
  const finals=(apiMatches||[]).filter(m=>m.stage && m.stage!=="GROUP_STAGE");
  if(!finals.length){
    return emptyState("🏟️","Tableau pas encore disponible","La phase finale s'affichera dès que le calendrier des 16es de finale sera publié.");
  }
  const byStage={};
  finals.forEach(m=>{(byStage[m.stage]=byStage[m.stage]||[]).push(m)});
  const sortById=a=>(a||[]).slice().sort((x,y)=>Number(x.id)-Number(y.id));
  // 8es -> finale : slots pré-alloués -> ordre par id = ordre du tableau (stable).
  const R16=sortById(byStage.LAST_16), QF=sortById(byStage.QUARTER_FINALS),
        SF=sortById(byStage.SEMI_FINALS), F=sortById(byStage.FINAL);
  // 16es : paires d'ids consécutifs (confirmé par les résultats). On place chaque paire
  // sous SON 8e (déduit du vainqueur déjà placé) ; les paires encore inconnues prennent
  // les slots restants. Aucune branche n'est AFFIRMÉE tant qu'un résultat ne la confirme pas.
  const r32=sortById(byStage.LAST_32);
  let R32=r32;
  if(r32.length===16 && R16.length===8){
    const pairs=[]; for(let i=0;i<16;i+=2)pairs.push([r32[i],r32[i+1]]);
    const slotOf=t=>{const w=brkWinnerId(t); if(w==null)return -1; return R16.findIndex(r=>brkChildHas(r,w));};
    const placed=new Array(8).fill(null), rest=[];
    pairs.forEach(p=>{let s=slotOf(p[0]); if(s<0)s=slotOf(p[1]); if(s>=0 && !placed[s])placed[s]=p; else rest.push(p);});
    let ri=0; for(let s=0;s<8;s++)if(!placed[s])placed[s]=rest[ri++]||[];
    R32=placed.flat();
  }
  // Colonnes de l'arbre. on=lien confirmé par un résultat (trait plein), sinon pointillé.
  const stages=[
    {key:"LAST_32",ms:R32,child:R16},
    {key:"LAST_16",ms:R16,child:QF},
    {key:"QUARTER_FINALS",ms:QF,child:SF},
    {key:"SEMI_FINALS",ms:SF,child:F},
    {key:"FINAL",ms:F,child:[]}
  ].filter(s=>s.ms && s.ms.length);
  const cols=stages.map((st,ci)=>{
    const last=ci===stages.length-1;
    const cells=st.ms.map((m,i)=>{
      const child=last?null:st.child[Math.floor(i/2)];
      const on=!last && brkChildHas(child,brkWinnerId(m)); // ce match envoie son vainqueur dans l'enfant ?
      const cls=["brk-cell"];
      if(on)cls.push("lc-on"); // trait horizontal seulement si confirmé
      if(!last && i%2===0){ // la cellule du haut porte le trait vertical de la paire
        const sib=st.ms[i+1], onSib=brkChildHas(child,brkWinnerId(sib));
        if(on && onSib)cls.push("vj-on"); // jointure verticale seulement si les DEUX feeders sont confirmés
      }
      return `<div class="${cls.join(' ')}">${brkCard(m)}</div>`;
    }).join("");
    return `<div class="brk-col"><div class="brk-h">${stageLabel(st.key)}</div><div class="brk-cells">${cells}</div></div>`;
  }).join("");
  // 3e place (petite finale) : hors arbre, affichée dessous.
  let third="";
  if(byStage.THIRD_PLACE && byStage.THIRD_PLACE[0]){
    third=`<div class="brk-third"><div class="brk-h">${stageLabel("THIRD_PLACE")}</div>${brkCard(byStage.THIRD_PLACE[0])}</div>`;
  }
  const legend=`<div class="brk-legend">Les branches s'affichent au fur et à mesure des résultats (le vainqueur d'un match rejoint le tour suivant).</div>`;
  return legend+`<div class="brk-scroll"><div class="brk">${cols}</div></div>`+third;
}

  const mascMini=EAGLE_SVG.replace('<svg ','<svg width="30" height="34" ');
  const head=`<div class="rh" onclick="toggleResumay()">
      <span class="rmasc">${mascMini}</span><h3>Morning Resumay</h3>
      <div class="rctl">
        ${open?`<button class="refresh" onclick="event.stopPropagation();genResumay(true)" title="Nouvelle capsule">↻</button>`:``}
        <span class="chev ${open?'up':''}">${chev}</span>
      </div></div>`;
  const desc=`<p class="rdesc">Chaque matin, ta capsule Mondial : les résultats de la nuit, et les affiches du jour. ⚽</p>`;
  if(!open) return `<div class="resumay collapsed">${head}${desc}</div>`;
  const txt = state.resumay ? state.resumay.text : SEED_PREVIEW;
  const bubble = state.resumayLoading
    ? `<div class="rloading">Ta capsule se prépare…</div>`
    : `<div class="rtext">${escapeHtml(txt)}</div>`;
  return `<div class="resumay">
    ${head}
    ${desc}
    <div class="rbody">
      <div class="mascot">${EAGLE_SVG}</div>
      <div class="bubble">${bubble}</div>
    </div>
  </div>`;
}
// Lit la dernière capsule via /api/resumay (fonction Cloudflare). Cet appel, en plus de
// renvoyer le texte, déclenche côté serveur la génération du jour si besoin (1x/jour max).
// Ne génère JAMAIS rien dans le navigateur (la clé IA reste côté serveur).
async function loadResumay(){
  try{
    const res=await fetch("/api/resumay");
    if(!res.ok) return;
    const data=await res.json().catch(()=>null);
    if(data && data.text){
      state.resumay={date:Date.now(),text:data.text};
      store.set("cm26_resumay",state.resumay);
      render();
    }
  }catch(e){ /* silencieux : on garde le repli local */ }
}
// Bouton ↻ : recharge simplement la dernière capsule depuis Supabase
// (la génération se fait automatiquement chaque matin côté serveur).
async function genResumay(force){
  state.resumayLoading=true; render();
  await loadResumay();
  state.resumayLoading=false; render();
}

function starTile(){
  const stars=[[30,46,24,'#ef2b3d',-12],[140,98,16,'#ffffff',9],[64,158,15,'#ffffff',20],
    [156,224,22,'#ef2b3d',-18],[24,272,17,'#ffffff',6],[104,322,19,'#ef2b3d',14],[182,32,13,'#ffffff',0]];
  const body=stars.map(([x,y,s,c,r])=>`<text x='${x}' y='${y}' font-size='${s}' fill='${c}' transform='rotate(${r} ${x} ${y})'>\u2605</text>`).join('');
  // pictos pays h\u00f4tes, int\u00e9gr\u00e9s discr\u00e8tement comme les \u00e9toiles
  const pictos=[['sombrero',92,34,1.1,-8],['chili',38,120,1,12],['moustache',122,176,1,0],['maple',56,250,1,-6],['beaver',136,300,1,7]];
  const pbody=pictos.map(([t,x,y,s,r])=>`<g transform='translate(${x} ${y}) rotate(${r} 12 12) scale(${s})' opacity='0.5'>${hostPictoSVG(t)}</g>`).join('');
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='172' height='360'>${body}${pbody}</svg>`;
  return "data:image/svg+xml,"+encodeURIComponent(svg);
}
function paintStars(){
  const url='url("'+starTile()+'")';
  const l=document.getElementById('starsLeft'),r=document.getElementById('starsRight');
  if(l)l.style.backgroundImage=url; if(r)r.style.backgroundImage=url;
}
paintStars();

  try{ if(store.get("cm26_news_seen","")===NEWS_VERSION)return; }catch(e){}

}
